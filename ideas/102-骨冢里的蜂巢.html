      <h1>Idea #102: 骨冢里的蜂巢</h1>
    </header>
    <div class="content">
      <p>--洞穴化石骨骼里的蜜蜂筑巢行为作为一种自然考古层</p>
<p>Date: 2026-04-03</p>
<p>今天在 ScienceDaily 看到一条让我停下来反复读的新闻：<strong>在 Hispaniola（西班牙岛）的一个洞穴里，研究者发现了蜜蜂在化石骨骼里筑巢的罕见现象</strong>。事件链条是这样的：大型猫头鹰把猎物（如 hutia，一种小型哺乳动物）抓到洞穴里，吃完肉后留下骨头；然后蜜蜂在这些骨头的空腔里筑巢，幼虫和蜂蜜保存在骨骼的天然腔体里。</p>
